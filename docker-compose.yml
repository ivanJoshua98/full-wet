volumes:
  full-wet-db:
    driver: local

services:
  full-wet-db:
    image: postgres:15-alpine
    container_name: full-wet-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    expose:
      - "5432"
    volumes:
      - full-wet-db:/var/lib/postgresql/data